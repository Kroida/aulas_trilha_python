{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX</title>
    <link rel="stylesheet" href="{% static 'all/css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body class="bindex">
    <img src="{% static 'all/img/background.jpg' %}" alt="Pão">

    <main class="qmain">
        <h2>Pagamento PIX</h2>
        <img src="{{ qr_code_path }}" alt="QR Code PIX">

        <h2>Código PIX:</h2>
        <textarea readonly>{{ qr_code_text }}</textarea>
        <button onclick="copyToClipboard()">Copiar código</button>

        <p>ID da transação: {{ reference_id }}</p>
    </main>

    <script src="{% static 'all/js/script.js' %}"></script>
</body>

</html>
